name: Tag, build, and publish

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if version changed
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  smoke-test:
    needs: tag
    if: needs.tag.outputs.tag != ''
    uses: ./.github/workflows/_docker-smoke-test.yml

  build-and-push:
    needs: [tag, smoke-test]
    if: needs.tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.tag }}
            type=raw,value=latest

      - name: Compute short SHA
        id: sha
        env:
          SHA: ${{ github.sha }}
        run: echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.short }}
            GIT_BRANCH=main
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # If `.github/release-notes/<tag>.md` exists, use it as the
      # release body (e.g. for a user-friendly feature announcement).
      # Auto-generated notes (PR titles) are still appended underneath
      # by softprops/action-gh-release. Older tags without a file get
      # only the auto-generated notes — same as before.
      - name: Find release notes file
        id: notes
        run: |
          NOTES_FILE=".github/release-notes/${{ needs.tag.outputs.tag }}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (with custom notes)
        if: steps.notes.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true

      - name: Create GitHub Release (auto-generated only)
        if: steps.notes.outputs.path == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
